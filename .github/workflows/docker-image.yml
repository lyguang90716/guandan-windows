name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 支持手动点击按钮触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 配置 Node 环境并运行代码检查
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies & Check
      run: |
        npm install
        npm run lint || echo "Lint warnings bypass"
        # 如果项目有 TypeScript 检查，可以加上 npm run check

    # 3. 登录到 Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4. 设置 Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5. 构建并推送到 Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 镜像名字自动命名为 guandan-windows
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/guandan-windows:latest
